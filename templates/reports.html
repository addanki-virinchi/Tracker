{% extends "base.html" %}
{% block content %}
<main class="page">
  <section class="toolbar">
    <a class="button primary sticky-add" href="{{ url_for('expense_new') }}">Add Expense</a>
    <a class="button ghost" href="{{ url_for('dashboard') }}">Dashboard</a>
    <a class="button ghost" href="{{ build_url('export_csv') }}">Export CSV</a>
    <a class="button ghost" href="{{ build_url('export_xlsx') }}">Export Excel</a>
  </section>
  <section class="card">
    <div class="card-head">
      <h3>Monthly breakdown</h3>
    </div>
    <div class="report-list">
      {% for category, amount in breakdown.items() %}
        <div class="report-row">
          <span>{{ category }}</span>
          <strong>{{ amount | money }}</strong>
        </div>
      {% endfor %}
      <div class="report-row total">
        <span>Total</span>
        <strong>{{ total | money }}</strong>
      </div>
    </div>
  </section>
</main>
{% endblock %}
