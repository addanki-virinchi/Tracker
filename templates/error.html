{% extends "base.html" %}
{% block content %}
<main class="page">
  <section class="card">
    <h3>{{ code }}</h3>
    <p class="muted">{{ message }}</p>
    <a class="button primary" href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('login') }}">Continue</a>
  </section>
</main>
{% endblock %}
